[gitlab]
# Set via REFORGE_GITLAB_URL environment variable
url = "https://gitlab.example.com"
insecure = true

[scan]
projects = ["test/configurations"]

[managers]
enabled = ["helm", "docker"]

[versioning]
pin_strategy = "semver-minor"

[merge_request]
branch_prefix = "reforge/"
labels = ["reforge", "automated", "reforge-e2e-test"]
grouping = "per-dependency"
auto_merge = false
rebase_enabled = false

[dashboard]
enabled = true
labels = ["reforge", "dependency-dashboard"]

[changelog]
enabled = false

[vulnerability]
enabled = false

[replacement]
enabled = true
warn_only = true

[lockfile]
enabled = true

# Configure private registry credentials if needed
# [registries."registry.example.com"]
# password_env = "REGISTRY_API_KEY"

[[regex_managers]]
name = "argocd-helm-version"
file_patterns = ["apps/**/*.yaml"]
match_pattern = 'helmChart:\s*"oci://(?P<registryUrl>[^"]+/[^"]+)/(?P<depName>[^"/]+)"\nhelmVersion:\s*"(?P<currentValue>[^"]+)"'
datasource = "helm-oci"
